# Optio Helm Chart — Recommended Production Values
#
# Install from GHCR (released chart):
#   helm install optio oci://ghcr.io/jonwiggins/optio --version 1.0.0 \
#     -n optio --create-namespace \
#     -f values.production.yaml \
#     --set encryption.key=<generated-key> \
#     --set auth.github.clientId=<id> \
#     --set auth.github.clientSecret=<secret> \
#     --set externalDatabase.url=<postgres-url> \
#     --set externalRedis.url=<redis-url> \
#     --set publicUrl=https://optio.example.com
#
# Or from source:
#   helm install optio helm/optio -n optio --create-namespace \
#     -f helm/optio/values.production.yaml \
#     --set encryption.key=<generated-key> \
#     ...
#
# Upgrade to a new release:
#   helm upgrade optio oci://ghcr.io/jonwiggins/optio --version 1.1.0 -n optio
#
# Generate encryption key: openssl rand -hex 32

# --- API Server ---
# Images default to GHCR in values.yaml — no image overrides needed here.
api:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  antiAffinity: hard
  # Pod disruption budget — keeps at least 1 replica during rolling updates
  pdb:
    enabled: true
    minAvailable: 1
  # Horizontal pod autoscaler
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# --- Web UI ---
web:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  antiAffinity: hard
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# --- Agent containers ---
# Images and pull policies default to GHCR / IfNotPresent in values.yaml.

# --- Use external managed database and Redis ---
postgresql:
  enabled: false
redis:
  enabled: false

# For production, it is highly recommended to manage sensitive credentials securely
# using an existing secret in Kubernetes (e.g., synced via external-secrets from Vault/AWS Secrets Manager).
# If using existingSecret, keys like DATABASE_URL, OPTIO_ENCRYPTION_KEY, and OAuth client secrets
# do not need to be supplied in the Helm values files or --set flags.
# existingSecret: "optio-production-secrets"

# --- Authentication (required for production) ---
auth:
  disabled: false
  # Configure at least one provider below:
  # github:
  #   clientId: "your-github-client-id"
  #   # clientSecret is loaded from existingSecret (key: GITHUB_OAUTH_CLIENT_SECRET)

# --- Ingress with TLS ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod
  hosts:
    - host: optio.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
        - path: /ws
          pathType: Prefix
          service: api

# --- Resource quotas to limit agent resource consumption ---
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "50"
    persistentvolumeclaims: "30"
