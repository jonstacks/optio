{{- if and .Values.postgresql.enabled (not .Values.auth.disabled) (not .Values.postgresql.auth.password) (not .Values.postgresql.auth.existingSecret) }}
  {{- fail "postgresql.auth.password is required when auth is enabled. Set a strong password for production use (or supply an existing secret via postgresql.auth.existingSecret)." }}
{{- end }}
{{- include "optio.validateRequired" . }}
{{- include "optio.validateEncryptionKey" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "optio.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $dbUrl := include "optio.databaseUrl" . }}
  {{- if $dbUrl }}
  DATABASE_URL: {{ $dbUrl | quote }}
  {{- end }}
  {{- $redisUrl := include "optio.redisUrl" . }}
  {{- if $redisUrl }}
  REDIS_URL: {{ $redisUrl | quote }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.tls.enabled }}
  REDIS_CA_CERT_PATH: "/etc/redis-tls/ca.crt"
  {{- end }}
  {{- if or .Values.encryption.key (not .Values.existingSecret) }}
  OPTIO_ENCRYPTION_KEY: {{ required "encryption.key is required (or supply via existingSecret)" .Values.encryption.key | quote }}
  {{- end }}
  OPTIO_AGENT_IMAGE: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
  OPTIO_AGENT_IMAGE_PREFIX: {{ .Values.agent.image.prefix | quote }}
  OPTIO_AGENT_IMAGE_TAG: {{ .Values.agent.image.tag | quote }}
  OPTIO_IMAGE_PULL_POLICY: {{ .Values.agent.imagePullPolicy | quote }}
  OPTIO_RUNTIME: "kubernetes"
  OPTIO_AUTH_DISABLED: {{ .Values.auth.disabled | quote }}
  {{- if .Values.publicUrl }}
  PUBLIC_URL: {{ .Values.publicUrl | quote }}
  {{- end }}
  {{- if .Values.auth.github.clientId }}
  GITHUB_OAUTH_CLIENT_ID: {{ .Values.auth.github.clientId | quote }}
  {{- if .Values.auth.github.clientSecret }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .Values.auth.github.clientSecret | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.auth.google.clientId }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.auth.google.clientId | quote }}
  {{- if .Values.auth.google.clientSecret }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .Values.auth.google.clientSecret | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.auth.gitlab.clientId }}
  GITLAB_OAUTH_CLIENT_ID: {{ .Values.auth.gitlab.clientId | quote }}
  {{- if .Values.auth.gitlab.clientSecret }}
  GITLAB_OAUTH_CLIENT_SECRET: {{ .Values.auth.gitlab.clientSecret | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.auth.oidc.issuerUrl }}
  OIDC_ISSUER_URL: {{ .Values.auth.oidc.issuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.auth.oidc.clientId | quote }}
  {{- if .Values.auth.oidc.clientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.oidc.displayName }}
  OIDC_DISPLAY_NAME: {{ .Values.auth.oidc.displayName | quote }}
  {{- end }}
  {{- if .Values.auth.oidc.scopes }}
  OIDC_SCOPES: {{ .Values.auth.oidc.scopes | quote }}
  {{- end }}
  {{- end }}
  {{- /* GitHub App IDs must be quoted strings in values.yaml to avoid YAML float truncation */ -}}
  {{- if and .Values.github.app.id (not .Values.github.app.existingSecret) }}
  GITHUB_APP_ID: {{ .Values.github.app.id | toString | quote }}
  GITHUB_APP_CLIENT_ID: {{ .Values.github.app.clientId | toString | quote }}
  GITHUB_APP_CLIENT_SECRET: {{ .Values.github.app.clientSecret | toString | quote }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.github.app.installationId | toString | quote }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.github.app.privateKey | toString | quote }}
  {{- if .Values.github.app.botName }}
  GITHUB_APP_BOT_NAME: {{ .Values.github.app.botName | quote }}
  {{- end }}
  {{- if .Values.github.app.botEmail }}
  GITHUB_APP_BOT_EMAIL: {{ .Values.github.app.botEmail | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.webhook.githubSecret }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.webhook.githubSecret | quote }}
  {{- end }}
  {{- if .Values.credentialSecret }}
  OPTIO_CREDENTIAL_SECRET: {{ .Values.credentialSecret | quote }}
  {{- else if and .Values.encryption.key (not .Values.existingSecret) }}
  OPTIO_CREDENTIAL_SECRET: {{ printf "%s:credential-secret" .Values.encryption.key | sha256sum | quote }}
  {{- end }}
  # Agent PVC configuration (read by API server at runtime)
  OPTIO_AGENT_PVC_STORAGE_CLASS: {{ .Values.agent.pvc.storageClass | quote }}
  OPTIO_AGENT_PVC_SIZE: {{ .Values.agent.pvc.size | quote }}
  # Agent pod scheduling
  {{- if .Values.agent.nodeSelector }}
  OPTIO_AGENT_NODE_SELECTOR: {{ .Values.agent.nodeSelector | toJson | quote }}
  {{- end }}
  {{- if .Values.agent.tolerations }}
  OPTIO_AGENT_TOLERATIONS: {{ .Values.agent.tolerations | toJson | quote }}
  {{- end }}
  # Cache directory PVC configuration
  OPTIO_CACHE_ENABLED: {{ .Values.agent.cache.enabled | quote }}
  OPTIO_CACHE_STORAGE_CLASS: {{ .Values.agent.cache.storageClass | quote }}
  OPTIO_CACHE_MAX_SIZE_PER_DIR_GI: {{ .Values.agent.cache.maxSizePerDirectoryGi | quote }}
  OPTIO_CACHE_MAX_SIZE_TOTAL_GI: {{ .Values.agent.cache.maxSizeTotalGi | quote }}
  OPTIO_CACHE_DEFAULT_SIZE_GI: {{ .Values.agent.cache.defaultSizePerDirectoryGi | quote }}
  # Repo init timeout
  OPTIO_REPO_INIT_TIMEOUT_MS: {{ .Values.agent.repoInitTimeoutMs | quote }}
  {{- if .Values.notifications.vapid.publicKey }}
  OPTIO_VAPID_PUBLIC_KEY: {{ .Values.notifications.vapid.publicKey | quote }}
  {{- if .Values.notifications.vapid.privateKey }}
  OPTIO_VAPID_PRIVATE_KEY: {{ .Values.notifications.vapid.privateKey | quote }}
  {{- end }}
  OPTIO_VAPID_SUBJECT: {{ .Values.notifications.vapid.subject | quote }}
  {{- end }}
  # Optio agent pod configuration
  OPTIO_POD_ENABLED: {{ .Values.optio.enabled | quote }}
  # OpenTelemetry configuration
  {{- if .Values.observability.otel.enabled }}
  OPTIO_OTEL_ENABLED: "true"
  {{- if .Values.observability.otel.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otel.endpoint | quote }}
  {{- end }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.observability.otel.protocol | quote }}
  {{- if .Values.observability.otel.headers }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.observability.otel.headers | quote }}
  {{- end }}
  OTEL_SERVICE_NAME: {{ .Values.observability.otel.serviceName | quote }}
  {{- if .Values.observability.otel.resourceAttributes }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.observability.otel.resourceAttributes | quote }}
  {{- end }}
  OPTIO_OTEL_SAMPLING_RATIO: {{ .Values.observability.otel.samplingRatio | quote }}
  OPTIO_OTEL_METRICS_INTERVAL_MS: {{ .Values.observability.otel.metricsIntervalMs | quote }}
  {{- if .Values.observability.otel.logsEnabled }}
  OPTIO_OTEL_LOGS_ENABLED: "true"
  {{- end }}
  {{- if .Values.observability.otel.debug }}
  OPTIO_OTEL_DEBUG: "true"
  {{- end }}
  {{- end }}
